services:
  - type: web
    name: esk
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/auth/me
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project-data
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_REASONING_EFFORT
        value: low
    disk:
      name: esk-data
      mountPath: /opt/render/project-data
      sizeGB: 2
